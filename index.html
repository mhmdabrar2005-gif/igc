<!DOCTYPE html>
<html>
<head>
    <header>
        <h1>Investment Growth Calculator</h1>
    </header>
    <title>Number Input Example</title>
</head>
<body>
<script src="index.js"></script>
<form onsubmit="calculateamount(); return false;">
<label for="initialInvestment">Initial investment:</label>
<input type="number" id="initialInvestment" name="initialInvestment" min=0 placeholder="0">
<br><br>
<label for="expectedGrowth">Expected growth rate (%):</label>
<input type="number" id="expectedGrowth" name="expectedGrowth" min=0  placeholder="0">
<br><br>
<label for="investmentDuration">Investing Period (years):</label>
<input type="number" id="investmentDuration" name="investmentDuration" min=0  placeholder="0">
<br><br>
<label for="stepUp">Step-up (% per year):</label>
<input type="number" id="stepUp" name="stepUp" min=0  placeholder="0">
<br><br>
<label for="compoundingPeriod">Compounding Period (years):</label>
<input type="number" id="compoundingPeriod" name="compoundingPeriod" min=0 placeholder="0">
<br><br>
<button type="submit">Calculate</button>
</form>
<br><br>
<label for="finalAmount" name="finalAmount" id="finalAmount">Your final amount will be: 0</label>
</body>
</html>
